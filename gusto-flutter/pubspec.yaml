name: meetv1
description: "Gusto Meets — Terrace booking platform for creators and photographers"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.0
  go_router: ^13.0.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.0
  supabase_flutter: ^2.5.0
  image_picker: ^1.1.0
  cached_network_image: ^3.3.1
  dio: ^5.4.0
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
    image_path: "assets/logo.png"
  image_path: "assets/logo.png"
